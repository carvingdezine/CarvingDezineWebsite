<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#000;--white:#fff;--red:#ff2a2a;
  --g1:#0a0a0a;--g2:#111;--g3:#1a1a1a;
  --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.13);
  --muted:rgba(255,255,255,.62);--muted2:rgba(255,255,255,.45);
  --ease:cubic-bezier(.19,1,.22,1);
  --f:'Outfit',sans-serif;--m:'DM Mono',monospace;
  --nav-h:56px;
}
html{overflow-x:hidden;font-size:16px;scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:var(--f);-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size:200px 200px;opacity:.5;}
a{color:inherit;text-decoration:none;}

/* NAV */
.wk-nav{position:fixed;top:0;left:0;right:0;z-index:900;height:var(--nav-h);
  display:flex;align-items:center;justify-content:space-between;padding:0 40px;
  background:rgba(0,0,0,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--line);}
.wk-logo{display:flex;align-items:center;gap:11px;text-decoration:none;}
.wk-logo span{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;}
.wk-back{display:flex;align-items:center;gap:8px;font-family:var(--m);font-size:10px;
  letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.45);transition:color .2s;}
.wk-back:hover{color:#fff;}
.wk-back svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* PAGE HEADER */
.wk-hd{padding:calc(var(--nav-h) + 56px) 40px 40px;border-bottom:1px solid var(--line);}
.wk-title{font-size:clamp(32px,6vw,64px);font-weight:900;letter-spacing:-.04em;line-height:.9;margin-bottom:12px;}
.wk-sub{font-size:14px;font-weight:300;color:rgba(255,255,255,.45);}
.wk-sub span{color:var(--red);}

/* FILTER BAR */
.wk-filters{
  position:sticky;top:var(--nav-h);z-index:100;
  background:rgba(0,0,0,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);
  padding:14px 40px;
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
}
.wk-fb{
  font-family:var(--m);font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.4);
  padding:5px 12px;background:transparent;cursor:pointer;
  transition:border-color .2s,color .2s,background .2s;
}
.wk-fb:hover{border-color:rgba(255,255,255,.3);color:#fff;}
.wk-fb.on{border-color:var(--red);color:var(--red);background:rgba(255,42,42,.06);}
.wk-fsep{width:1px;height:18px;background:var(--line);margin:0 4px;flex-shrink:0;}

/* RESULTS INFO */
.wk-info{padding:20px 40px;display:flex;align-items:center;justify-content:space-between;}
.wk-count{font-family:var(--m);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.3);}

/* MASONRY GRID */
.wk-masonry{
  column-count:3;
  column-gap:3px;
  padding:0 40px 60px;
}
.wk-masonry .pc{
  break-inside:avoid;
  margin-bottom:3px;
  display:block;
}
.wk-masonry .pc .pc-img{aspect-ratio:unset;}
.wk-masonry .pc .pc-img img{width:100%;height:auto;}

/* PROJECT CARD (shared styles) */
.pc{position:relative;background:var(--g2);overflow:hidden;cursor:pointer;}
.pc:hover .pc-img img{transform:scale(1.04);}
.pc-img{overflow:hidden;background:var(--g2);aspect-ratio:808/632;}
.pc-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease);display:block;}
.pc-ph{width:100%;height:100%;background:var(--g2);display:flex;align-items:center;justify-content:center;}
.pc-ph-n{font-size:38px;font-weight:900;letter-spacing:-.06em;color:rgba(255,255,255,.05);}
.pc-body{padding:14px 16px 18px;}
.pc-cat{font-family:var(--m);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);margin-bottom:5px;}
.pc-title{font-size:15px;font-weight:700;color:#fff;line-height:1.25;margin-bottom:3px;}
.pc-yr{font-family:var(--m);font-size:10px;letter-spacing:.08em;color:rgba(255,255,255,.38);}
.pc-line{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--red);transform:scaleX(0);transform-origin:left;transition:transform .35s var(--ease);}
.pc:hover .pc-line{transform:scaleX(1);}
.pc-badge{position:absolute;top:10px;left:10px;z-index:2;font-family:var(--m);font-size:8px;letter-spacing:.14em;text-transform:uppercase;background:rgba(0,0,0,.7);color:rgba(255,255,255,.6);padding:3px 8px;backdrop-filter:blur(8px);}
.pc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.pc-tag{font-family:var(--m);font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border:1px solid;}

/* Placeholder */
.img-ph{display:none;position:absolute;inset:0;background:var(--g3);flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.pc-img img.img-error~.img-ph{display:flex;}
.pc-img img.img-error{opacity:.1;}
.img-ph-icon{width:32px;height:32px;opacity:.15;}
.img-ph-txt{font-family:var(--m);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.2);text-align:center;}

/* Empty */
.wk-empty{padding:80px 40px;text-align:center;font-family:var(--m);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.2);}

/* Footer */
.wk-footer{padding:32px 40px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);}
.wk-fc{font-family:var(--m);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.2);}
.wk-fback{font-family:var(--m);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.28);transition:color .2s;}
.wk-fback:hover{color:#fff;}

/* Reveal */
.rv{opacity:0;transform:translateY(16px);transition:opacity .6s var(--ease),transform .6s var(--ease);}
.rv.in{opacity:1;transform:none;}

/* Responsive */
@media(max-width:900px){.wk-masonry{column-count:2;}.wk-nav{padding:0 20px;}.wk-hd,.wk-filters,.wk-info,.wk-masonry{padding-left:20px;padding-right:20px;}}
@media(max-width:560px){.wk-masonry{column-count:1;}}
</style>
</head>
<body>

<nav class="wk-nav">
  <a class="wk-logo" href="index.html">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 566.93 566.93" width="28" height="28">
      <circle cx="283.46" cy="283.46" r="283.46" fill="#E8001D"/>
      <path fill="#fff" d="M225.47,321c0-32.55,25.79-59.26,57.42-59.54h65.92v-60.51c-41.42,0-66.23,0-66.28,0-64.37.52-116.74,54.37-116.74,120.04,0,32.29,12.58,61.61,32.98,83.21l-24.51,49.34,64.65-21.46c13.75,5.76,28.8,8.96,44.56,8.96,14.32,0,28.04-2.63,40.75-7.43v-70.31c-10.48,10.64-24.88,17.23-40.75,17.23-31.98,0-58-26.71-58-59.54"/>
      <rect fill="rgba(255,255,255,0.5)" x="324.22" y="200.95" width="17.24" height="60.48"/>
      <path fill="#fff" d="M400.47,113.39c-32.59,0-59.01,26.42-59.01,59v148.61c0,1.09-.1,2.16-.16,3.24h.16v101.15c35.61-20.66,59.69-59.7,59.69-104.39V113.41c-.23,0-.46-.02-.68-.02"/>
    </svg>
    <span>Carving Dezine</span>
  </a>
  <a class="wk-back" href="index.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Home
  </a>
</nav>

<div class="wk-hd">
  <div class="wk-title">All Work</div>
  <div class="wk-sub">Showing <span id="wk-shown">—</span> projects</div>
</div>

<div class="wk-filters" id="wk-filters">
  <button class="wk-fb on" data-f="all">All</button>
  <button class="wk-fb" data-f="ux">UX / UI</button>
  <button class="wk-fb" data-f="brand">Brand Identity</button>
  <button class="wk-fb" data-f="deck">Presentations</button>
  <button class="wk-fb" data-f="print">Print</button>
  <button class="wk-fb" data-f="web">Interactive Web</button>
  <div class="wk-fsep"></div>
  <div id="wk-tag-filters"></div>
</div>

<div class="wk-masonry" id="wk-grid"></div>
<div class="wk-empty" id="wk-empty" style="display:none">No projects match this filter.</div>

<footer class="wk-footer">
  <span class="wk-fc">&copy; 2026 Carving Dezine</span>
  <a class="wk-fback" href="index.html">&larr; Back to Home</a>
</footer>

<script>
var PJKEY='cd_pj',TAGSKEY='cd_tags';
var CMAP={ux:'UX / UI Design',brand:'Brand Identity',deck:'Presentation Design',print:'Print & Marketing',web:'Interactive Web'};
var PRESET_TAGS=[
  {id:'completed',label:'Completed',color:'green'},
  {id:'wip',label:'Work in Progress',color:'amber'},
  {id:'coming-soon',label:'Coming Soon',color:'blue'},
  {id:'concept',label:'Concept',color:'purple'},
  {id:'on-hold',label:'On Hold',color:'gray'},
  {id:'featured',label:'Featured',color:'red'},
  {id:'case-study',label:'Case Study',color:'teal'},
  {id:'award-winning',label:'Award Winning',color:'red'},
  {id:'confidential',label:'Confidential',color:'gray'},
  {id:'personal',label:'Personal Project',color:'purple'}
];
var TAG_COLORS={
  green:{border:'rgba(97,196,89,.4)',text:'#97C459'},
  amber:{border:'rgba(239,159,39,.4)',text:'#EF9F27'},
  blue:{border:'rgba(55,138,221,.4)',text:'#85B7EB'},
  purple:{border:'rgba(175,169,236,.4)',text:'#AFA9EC'},
  gray:{border:'rgba(136,135,128,.4)',text:'#888780'},
  red:{border:'rgba(255,42,42,.4)',text:'#ff2a2a'},
  teal:{border:'rgba(93,202,165,.4)',text:'#5DCAA5'}
};
function gPj(){try{return JSON.parse(localStorage.getItem(PJKEY))||[]}catch(e){return[]}}
function gTags(){try{return JSON.parse(localStorage.getItem(TAGSKEY))||[]}catch(e){return[]}}
function getAllTags(){return PRESET_TAGS.concat(gTags())}
function getTagById(id){return getAllTags().find(function(t){return t.id===id})||null}
function renderTagBadges(tagIds){
  if(!tagIds||!tagIds.length)return'';
  return tagIds.map(function(id){
    var t=getTagById(id);if(!t)return'';
    var c=TAG_COLORS[t.color]||TAG_COLORS.gray;
    return'<span class="pc-tag" style="border-color:'+c.border+';color:'+c.text+'">'+t.label+'</span>';
  }).join('');
}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

var _catFilter='all', _tagFilter='all';

function getAllProjects(){
  return gPj().filter(function(p){return p.img;});
}

function mkCard(p){
  var srcLabel=p.src==='behance'?'Behance':p.src==='dribbble'?'Dribbble':'';
  var badge=srcLabel?'<div class="pc-badge">'+srcLabel+'</div>':'';
  var imgH=p.img
    ?'<div class="pc-img" style="position:relative"><img src="'+esc(p.img)+'" alt="'+esc(p.title)+'" loading="lazy" onerror="this.classList.add(\'img-error\')"/>'
      +'<div class="img-ph"><svg class="img-ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>'
      +'<div class="img-ph-txt">Not uploaded</div></div></div>'
    :'<div class="pc-img"><div class="pc-ph"><div class="pc-ph-n">CD</div></div></div>';
  var tagsH=p.tags&&p.tags.length?'<div class="pc-tags">'+renderTagBadges(p.tags)+'</div>':'';
  return '<div class="pc rv" data-id="'+p.id+'" data-src="'+(p.src||'manual')+'" data-link="'+(p.link||'')+'">'
    +badge+imgH
    +'<div class="pc-body">'
    +'<div class="pc-cat">'+(CMAP[p.cat]||p.cat||'Project')+'</div>'
    +'<div class="pc-title">'+esc(p.title)+'</div>'
    +'<div class="pc-yr">'+p.year+(p.client?' \u00b7 '+p.client:'')+'</div>'
    +tagsH
    +'</div><div class="pc-line"></div></div>';
}

function render(){
  var all=getAllProjects();
  // Sort newest first
  all.sort(function(a,b){return (parseInt(b.year)||0)-(parseInt(a.year)||0);});

  var filtered=all;
  if(_catFilter!=='all') filtered=filtered.filter(function(p){return p.cat===_catFilter;});
  if(_tagFilter!=='all') filtered=filtered.filter(function(p){return p.tags&&p.tags.indexOf(_tagFilter)!==-1;});

  var grid=document.getElementById('wk-grid');
  var empty=document.getElementById('wk-empty');
  var shown=document.getElementById('wk-shown');

  if(shown)shown.textContent=filtered.length;

  if(!filtered.length){
    grid.innerHTML='';
    empty.style.display='block';
    return;
  }
  empty.style.display='none';
  grid.innerHTML=filtered.map(mkCard).join('');

  // Click handlers
  grid.querySelectorAll('.pc').forEach(function(card){
    var id=card.dataset.id,link=card.dataset.link,src=card.dataset.src;
    card.addEventListener('click',function(){
      if(src==='manual'||!link){window.location.href='project.html?id='+id;}
      else{window.open(link,'_blank');}
    });
  });

  // Reveal
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target);}});
  },{threshold:0.05});
  grid.querySelectorAll('.rv').forEach(function(el){obs.observe(el);});
}

// Build tag filter buttons from tags actually used
function buildTagFilters(){
  var all=getAllProjects();
  var usedIds={};
  all.forEach(function(p){(p.tags||[]).forEach(function(id){usedIds[id]=true;});});
  var used=getAllTags().filter(function(t){return usedIds[t.id];});
  var wrap=document.getElementById('wk-tag-filters');
  if(!wrap||!used.length)return;
  wrap.innerHTML=used.map(function(t){
    var c=TAG_COLORS[t.color]||TAG_COLORS.gray;
    return'<button class="wk-fb" data-tag="'+t.id+'" style="border-color:'+c.border+';color:'+c.text+'">'+t.label+'</button>';
  }).join('');
  wrap.querySelectorAll('[data-tag]').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.wk-fb').forEach(function(b){b.classList.remove('on');});
      btn.classList.add('on');
      _tagFilter=btn.dataset.tag;
      _catFilter='all';
      render();
    });
  });
}

// Cat filter listeners
document.querySelectorAll('.wk-fb[data-f]').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.wk-fb').forEach(function(b){b.classList.remove('on');});
    btn.classList.add('on');
    _catFilter=btn.dataset.f;
    _tagFilter='all';
    render();
  });
});

buildTagFilters();
render();
</script>
</body>
