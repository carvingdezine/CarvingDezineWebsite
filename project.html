<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#000;--white:#fff;--red:#ff2a2a;
  --g1:#0a0a0a;--g2:#111;--g3:#1a1a1a;--g4:#222;
  --muted:rgba(255,255,255,.62);--muted2:rgba(255,255,255,.45);
  --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.13);
  --ease:cubic-bezier(.19,1,.22,1);
  --f:'Outfit',sans-serif;--m:'DM Mono',monospace;
  --nav-h:56px;
  --left:60%;--right:40%;
}
html{overflow-x:hidden;font-size:16px;scroll-behavior:smooth}
body{background:var(--black);color:var(--white);font-family:var(--f);overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size:200px 200px;opacity:.5;}

/* ── NAV ── */
.pj-nav{
  position:fixed;top:0;left:0;right:0;z-index:900;height:var(--nav-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;
  background:rgba(0,0,0,.88);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
}
.pj-nav-logo{display:flex;align-items:center;gap:11px;text-decoration:none;}
.pj-nav-logo span{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--white);}
.pj-back{
  display:flex;align-items:center;gap:8px;
  font-family:var(--m);font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.45);text-decoration:none;transition:color .2s;
}
.pj-back:hover{color:var(--white);}
.pj-back svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── SPLIT LAYOUT ── */
.pj-split{
  display:flex;
  align-items:flex-start;
}

/* LEFT — gallery scrolls with page */
.pj-left{
  width:var(--left);
  flex-shrink:0;
  margin-top:var(--nav-h);
}

/* RIGHT — truly fixed, always visible */
.pj-right{
  position:fixed;
  top:var(--nav-h);
  right:0;
  width:var(--right);
  height:calc(100vh - var(--nav-h));
  overflow-y:auto;
  display:flex;flex-direction:column;justify-content:center;
  padding:48px 52px;
  border-left:1px solid var(--line);
  scrollbar-width:none;
  z-index:10;
  background:var(--black);
}

/* ── GALLERY ── */
.pj-gallery{display:flex;flex-direction:column;}

/* Each image block */
.pj-img-block{
  position:relative;overflow:hidden;
  background:var(--g2);
}
.pj-img-block img{
  width:100%;height:auto;display:block;
  transform:scale(1.06);
  transition:transform 1.2s var(--ease);
}
.pj-img-block.in-view img{transform:scale(1);}

/* Side by side pair */
.pj-img-pair{display:grid;grid-template-columns:1fr 1fr;}
.pj-img-pair .pj-img-block img{height:100%;object-fit:cover;}

/* Gap option — class added per image */
.pj-gap-top{margin-top:3px;}

/* ── RIGHT PANEL CONTENT ── */
.pj-cat{
  font-family:var(--m);font-size:10px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--red);margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.pj-cat::before{content:'';display:block;width:20px;height:1px;background:var(--red);}
.pj-title{
  font-size:clamp(22px,2.8vw,36px);font-weight:800;
  letter-spacing:-.025em;line-height:1.1;
  color:var(--white);margin-bottom:20px;
}
.pj-meta{
  display:flex;flex-direction:column;gap:6px;
  margin-bottom:28px;
  padding-bottom:28px;
  border-bottom:1px solid var(--line);
}
.pj-meta-row{
  display:flex;align-items:baseline;gap:10px;
  font-family:var(--m);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
}
.pj-meta-label{color:rgba(255,255,255,.25);width:70px;flex-shrink:0;}
.pj-meta-val{color:rgba(255,255,255,.65);}
.pj-desc-text{
  font-size:14px;font-weight:300;line-height:1.9;
  color:rgba(255,255,255,.6);
  margin-bottom:28px;
  flex:1;
  overflow-y:auto;
  scrollbar-width:none;
  white-space:pre-wrap;
}
.pj-desc-text::-webkit-scrollbar{display:none;}
.pj-actions{display:flex;flex-wrap:wrap;gap:8px;padding-top:20px;border-top:1px solid var(--line);}

/* Share button */
.pj-share-btn{
  display:flex;align-items:center;gap:7px;
  font-family:var(--m);font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.5);background:transparent;
  border:1px solid var(--line2);padding:9px 16px;cursor:pointer;
  transition:color .2s,border-color .2s;position:relative;
}
.pj-share-btn:hover{color:var(--white);border-color:rgba(255,255,255,.3);}
.pj-share-btn svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.pj-share-drop{
  position:absolute;bottom:calc(100% + 6px);left:0;z-index:10;
  background:rgba(10,10,10,.97);backdrop-filter:blur(16px);
  border:1px solid var(--line2);padding:6px 0;min-width:160px;
  opacity:0;pointer-events:none;transform:translateY(4px);
  transition:opacity .15s,transform .15s;
}
.pj-share-drop.open{opacity:1;pointer-events:auto;transform:translateY(0);}
.pj-share-opt{
  padding:9px 16px;font-family:var(--m);font-size:10px;
  letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.6);cursor:pointer;
  display:flex;align-items:center;gap:10px;
  transition:background .15s,color .15s;
}
.pj-share-opt:hover{background:rgba(255,42,42,.1);color:#fff;}
.pj-share-opt svg{width:11px;height:11px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.pj-ext-btn{
  display:flex;align-items:center;gap:7px;
  font-family:var(--m);font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.5);background:transparent;
  border:1px solid var(--line2);padding:9px 16px;
  cursor:pointer;text-decoration:none;
  transition:color .2s,border-color .2s;
}
.pj-ext-btn:hover{color:var(--white);border-color:rgba(255,255,255,.3);}
.pj-ext-btn svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* Progress bar on right panel */
.pj-progress{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--line);
}
.pj-progress-bar{
  height:100%;background:var(--red);
  width:0%;transition:width .1s linear;
}

/* ── BOTTOM SECTIONS — full width but account for fixed right panel ── */
.pj-below{
  width:var(--left);
}

/* Prev/Next */
.pj-prevnext{
  display:grid;grid-template-columns:1fr 1fr;
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
  width:var(--left);
}
.pj-prev,.pj-next{
  padding:40px;display:flex;flex-direction:column;gap:8px;
  text-decoration:none;transition:background .2s;
}
.pj-prev{border-right:1px solid var(--line);}
.pj-prev:hover,.pj-next:hover{background:var(--g1);}
.pj-next{align-items:flex-end;}
.pj-nav-dir{
  font-family:var(--m);font-size:9px;letter-spacing:.22em;text-transform:uppercase;
  color:rgba(255,255,255,.28);display:flex;align-items:center;gap:6px;
}
.pj-nav-dir svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.pj-nav-title{font-size:15px;font-weight:600;color:var(--white);line-height:1.3;}
.pj-nav-cat{font-family:var(--m);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);}

/* Related */
.pj-related{padding:72px 40px;width:var(--left);}
.pj-section-label{
  font-family:var(--m);font-size:10px;letter-spacing:.28em;text-transform:uppercase;
  color:rgba(255,255,255,.28);margin-bottom:32px;
  display:flex;align-items:center;gap:14px;
}
.pj-section-label::after{content:'';flex:1;height:1px;background:var(--line);}
.pj-related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.pj-rel-card{text-decoration:none;display:block;}
.pj-rel-img{aspect-ratio:808/632;overflow:hidden;background:var(--g2);margin-bottom:12px;}
.pj-rel-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease);}
.pj-rel-card:hover .pj-rel-img img{transform:scale(1.04);}
.pj-rel-cat{font-family:var(--m);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);margin-bottom:4px;}
.pj-rel-title{font-size:14px;font-weight:600;color:var(--white);line-height:1.3;}
.pj-rel-yr{font-family:var(--m);font-size:10px;color:rgba(255,255,255,.3);margin-top:3px;}

/* CTA */
.pj-cta{
  background:var(--g1);border-top:1px solid var(--line);
  padding:80px 40px;text-align:center;
  width:var(--left);
}
.pj-cta-eyebrow{font-family:var(--m);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--red);margin-bottom:16px;}
.pj-cta-title{font-size:clamp(28px,4vw,42px);font-weight:800;letter-spacing:-.025em;margin-bottom:12px;}
.pj-cta-sub{font-size:15px;font-weight:300;color:rgba(255,255,255,.45);margin-bottom:32px;}
.pj-cta-btn{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--red);color:var(--white);
  font-family:var(--m);font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  padding:14px 32px;text-decoration:none;transition:opacity .2s;
}
.pj-cta-btn:hover{opacity:.85;}

/* Footer */
.pj-footer{
  padding:28px 40px;display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--line);
  width:var(--left);
}
.pj-footer-copy{font-family:var(--m);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.2);}
.pj-footer-back{font-family:var(--m);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.28);text-decoration:none;transition:color .2s;}
.pj-footer-back:hover{color:var(--white);}

/* 404 */
.pj-404{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:40px;}
.pj-404-n{font-size:80px;font-weight:900;color:rgba(255,255,255,.04);letter-spacing:-.06em;}
.pj-404-t{font-size:22px;font-weight:700;}
.pj-404-s{font-size:14px;color:rgba(255,255,255,.4);}
.pj-404 a{color:var(--red);text-decoration:none;}

/* ── MOBILE ── */
@media(max-width:768px){
  .pj-nav{padding:0 20px;}
  .pj-split{flex-direction:column;}
  .pj-left{width:100%;margin-top:var(--nav-h);}
  .pj-right{
    position:relative;top:auto;right:auto;
    width:100%;height:auto;background:var(--black);
    padding:36px 24px;border-left:none;border-top:1px solid var(--line);
    order:-1;
  }
  .pj-prevnext,.pj-related,.pj-cta,.pj-footer{width:100%;}
  .pj-prevnext{grid-template-columns:1fr;}
  .pj-prev{border-right:none;border-bottom:1px solid var(--line);}
  .pj-next{align-items:flex-start;}
  .pj-related-grid{grid-template-columns:1fr 1fr;}
  .pj-related,.pj-below{padding-left:20px;padding-right:20px;}
}
@media(max-width:480px){
  .pj-related-grid{grid-template-columns:1fr;}
}
</style>
</head>

<div id="pj-root"></div>

<script>
var PJKEY='cd_pj';
var CMAP={ux:'UX / UI Design',brand:'Brand Identity',deck:'Presentation Design',print:'Print & Marketing',web:'Interactive Web'};
function gPj(){try{return JSON.parse(localStorage.getItem(PJKEY))||[]}catch(e){return[]}}
function getPjId(){return new URLSearchParams(window.location.search).get('id')}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function setMeta(p,c){var el=document.querySelector('meta[property="'+p+'"]');if(!el){el=document.createElement('meta');el.setAttribute('property',p);document.head.appendChild(el);}el.setAttribute('content',c);}

// Share
function togglePjShare(btn){
  var d=btn.querySelector('.pj-share-drop');
  d.classList.toggle('open');
}
function copyPjLink(){
  navigator.clipboard.writeText(window.location.href).then(function(){
    var el=document.getElementById('pj-copy-opt');
    if(el){var orig=el.textContent;el.textContent='\u2713 Copied!';setTimeout(function(){el.textContent=orig;},2000);}
  });
  closeDrop();
}
function nativePjShare(title){
  if(navigator.share)navigator.share({title:title+' \u2014 Carving Dezine',url:window.location.href});
  else navigator.clipboard.writeText(window.location.href);
  closeDrop();
}
function closeDrop(){document.querySelectorAll('.pj-share-drop').forEach(function(d){d.classList.remove('open');});}
document.addEventListener('click',function(e){if(!e.target.closest('.pj-share-btn'))closeDrop();});

function render(){
  var id=getPjId();
  var root=document.getElementById('pj-root');
  var projects=gPj();
  var pj=projects.find(function(p){return p.id===id});

  if(!pj){
    root.innerHTML='<div class="pj-404"><div class="pj-404-n">404</div><div class="pj-404-t">Project not found</div><div class="pj-404-s">This project may have been removed.</div><a href="index.html#work">\u2190 Back to all work</a></div>';
    return;
  }

  document.title=pj.title+' \u2014 Carving Dezine';
  setMeta('og:title',pj.title+' \u2014 Carving Dezine');
  setMeta('og:url',window.location.href);
  if(pj.img)setMeta('og:image',pj.img);

  var catLabel=CMAP[pj.cat]||pj.cat||'Project';

  // ── GALLERY ──
  var galleryH='<div class="pj-gallery">';
  var imgs=pj.images&&pj.images.length?pj.images:[];
  // Always show cover first
  if(pj.img){
    imgs=[{url:pj.img,layout:'full',gap:false}].concat(imgs.filter(function(im){return im.url!==pj.img}));
  }
  var i=0;
  while(i<imgs.length){
    var img=imgs[i];
    var gapClass=img.gap?' pj-gap-top':'';
    if(img.layout==='side'&&i+1<imgs.length&&imgs[i+1].layout==='side'){
      var img2=imgs[i+1];
      var gapClass2=img2.gap?' pj-gap-top':'';
      galleryH+='<div class="pj-img-pair'+(img.gap?' pj-gap-top':'')+'"><div class="pj-img-block"><img src="'+esc(img.url)+'" loading="'+(i<2?'eager':'lazy')+'" alt=""/></div><div class="pj-img-block"><img src="'+esc(img2.url)+'" loading="lazy" alt=""/></div></div>';
      i+=2;
    } else {
      galleryH+='<div class="pj-img-block'+gapClass+'"><img src="'+esc(img.url)+'" loading="'+(i<1?'eager':'lazy')+'" alt=""/></div>';
      i++;
    }
  }
  galleryH+='</div>';

  // ── RIGHT PANEL ──
  var metaH='';
  if(pj.year)metaH+='<div class="pj-meta-row"><span class="pj-meta-label">Year</span><span class="pj-meta-val">'+esc(pj.year)+'</span></div>';
  if(pj.client)metaH+='<div class="pj-meta-row"><span class="pj-meta-label">Client</span><span class="pj-meta-val">'+esc(pj.client)+'</span></div>';
  metaH+='<div class="pj-meta-row"><span class="pj-meta-label">Category</span><span class="pj-meta-val">'+catLabel+'</span></div>';

  var descH=pj.body?'<div class="pj-desc-text">'+esc(pj.body)+'</div>':'';

  var shareH='<button class="pj-share-btn" onclick="togglePjShare(this)">'
    +'<svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Share'
    +'<div class="pj-share-drop">'
    +'<div class="pj-share-opt" id="pj-copy-opt" onclick="copyPjLink()">'
    +'<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy link</div>'
    +'<div class="pj-share-opt" onclick="nativePjShare(\''+esc(pj.title)+'\')">'
    +'<svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Share\u2026</div>'
    +'</div></button>';

  var extH=pj.link
    ?'<a class="pj-ext-btn" href="'+esc(pj.link)+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>'+(pj.src==='behance'?'Behance':pj.src==='dribbble'?'Dribbble':'View Project')+'</a>'
    :'';

  var rightH='<div class="pj-right">'
    +'<div class="pj-progress"><div class="pj-progress-bar" id="pj-prog"></div></div>'
    +'<div class="pj-cat">'+catLabel+'</div>'
    +'<div class="pj-title">'+esc(pj.title)+'</div>'
    +'<div class="pj-meta">'+metaH+'</div>'
    +descH
    +'<div class="pj-actions">'+shareH+extH+'</div>'
    +'</div>';

  // ── PREV / NEXT ──
  var idx=projects.findIndex(function(p){return p.id===id});
  var prev=idx<projects.length-1?projects[idx+1]:null;
  var next=idx>0?projects[idx-1]:null;
  var prevH=prev
    ?'<a class="pj-prev" href="project.html?id='+prev.id+'">'
      +'<span class="pj-nav-dir"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Previous</span>'
      +'<span class="pj-nav-cat">'+(CMAP[prev.cat]||prev.cat||'')+'</span>'
      +'<span class="pj-nav-title">'+esc(prev.title)+'</span></a>'
    :'<div></div>';
  var nextH=next
    ?'<a class="pj-next" href="project.html?id='+next.id+'">'
      +'<span class="pj-nav-dir">Next<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></span>'
      +'<span class="pj-nav-cat">'+(CMAP[next.cat]||next.cat||'')+'</span>'
      +'<span class="pj-nav-title">'+esc(next.title)+'</span></a>'
    :'<div></div>';

  // ── RELATED ──
  var related=projects.filter(function(p){return p.id!==id&&p.cat===pj.cat&&p.img}).slice(0,3);
  var relatedH='';
  if(related.length){
    relatedH='<div class="pj-related">'
      +'<div class="pj-section-label">Related Projects</div>'
      +'<div class="pj-related-grid">'
      +related.map(function(r){
        return '<a class="pj-rel-card" href="project.html?id='+r.id+'">'
          +'<div class="pj-rel-img"><img src="'+esc(r.img)+'" alt="'+esc(r.title)+'" loading="lazy"/></div>'
          +'<div class="pj-rel-cat">'+(CMAP[r.cat]||r.cat)+'</div>'
          +'<div class="pj-rel-title">'+esc(r.title)+'</div>'
          +'<div class="pj-rel-yr">'+r.year+(r.client?' \u00b7 '+r.client:'')+'</div>'
          +'</a>';
      }).join('')
      +'</div></div>';
  }

  // ── ASSEMBLE ──
  root.innerHTML=
    '<div class="pj-split">'
      +'<div class="pj-left">'+galleryH+'</div>'
      +rightH
    +'</div>'
    +'<div class="pj-prevnext">'+prevH+nextH+'</div>'
    +relatedH
    +'<div class="pj-cta">'
      +'<div class="pj-cta-eyebrow">Like what you see?</div>'
      +'<div class="pj-cta-title">Let\'s work together</div>'
      +'<div class="pj-cta-sub">Tell me about your project and let\'s create something remarkable.</div>'
      +'<a class="pj-cta-btn" href="index.html#contact">Get in touch</a>'
    +'</div>'
    +'<footer class="pj-footer">'
      +'<span class="pj-footer-copy">\u00a9 2026 Carving Dezine</span>'
      +'<a class="pj-footer-back" href="index.html#work">\u2190 Back to work</a>'
    +'</footer>';

  // ── SCROLL PROGRESS ──
  var gallery=document.querySelector('.pj-left');
  var progBar=document.getElementById('pj-prog');
  window.addEventListener('scroll',function(){
    if(!gallery||!progBar)return;
    var rect=gallery.getBoundingClientRect();
    var total=gallery.offsetHeight-window.innerHeight;
    var scrolled=Math.max(0,-rect.top);
    var pct=total>0?Math.min(100,(scrolled/total)*100):100;
    progBar.style.width=pct+'%';
  },{passive:true});

  // ── IMAGE SCROLL REVEAL ──
  var imgObs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting)e.target.classList.add('in-view');
    });
  },{threshold:0.05,rootMargin:'0px 0px -5% 0px'});
  document.querySelectorAll('.pj-img-block').forEach(function(el){imgObs.observe(el);});
}

render();
</script>
</body>
</html>
