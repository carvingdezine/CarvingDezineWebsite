<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#000;--white:#fff;--red:#ff2a2a;
  --g1:#0a0a0a;--g2:#111;--g3:#1a1a1a;
  --muted:rgba(255,255,255,.62);
  --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.13);
  --ease:cubic-bezier(.19,1,.22,1);
  --f:'Outfit',sans-serif;--m:'DM Mono',monospace;
  --nav-h:56px;
  --right-w:40%;
  --left-w:60%;
}
html{overflow-x:hidden;font-size:16px;}
body{background:var(--black);color:var(--white);font-family:var(--f);-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size:200px 200px;opacity:.5;}

/* ── NAV ── */







/* ── RIGHT PANEL — fixed ── */
.pj-right{
  grid-column:2;
  position:sticky;
  top:var(--nav-h);
  height:calc(100vh - var(--nav-h));
  background:var(--black);
  border-left:1px solid var(--line);
  display:flex;flex-direction:column;justify-content:center;
  padding:48px 52px;
  overflow-y:auto;
  scrollbar-width:none;
}
.pj-right::-webkit-scrollbar{display:none;}

/* Progress bar */
.pj-progress{position:absolute;top:0;left:0;right:0;height:2px;background:var(--line);}
.pj-progress-bar{height:100%;background:var(--red);width:0%;transition:width .1s linear;}

/* Right panel content */
.pj-cat{font-family:var(--m);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--red);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.pj-cat::before{content:'';display:block;width:20px;height:1px;background:var(--red);}
.pj-title{font-size:clamp(20px,2.4vw,34px);font-weight:800;letter-spacing:-.025em;line-height:1.1;color:#fff;margin-bottom:20px;}
.pj-meta{display:flex;flex-direction:column;gap:7px;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--line);}
.pj-meta-row{display:flex;align-items:baseline;gap:10px;font-family:var(--m);font-size:10px;letter-spacing:.12em;text-transform:uppercase;}
.pj-meta-label{color:rgba(255,255,255,.25);width:72px;flex-shrink:0;}
.pj-meta-val{color:rgba(255,255,255,.65);}
.pj-desc-text{font-size:14px;font-weight:300;line-height:1.9;color:rgba(255,255,255,.6);flex:1;overflow-y:auto;scrollbar-width:none;white-space:pre-wrap;margin-bottom:24px;}
.pj-desc-text::-webkit-scrollbar{display:none;}
.pj-actions{display:flex;flex-wrap:wrap;gap:8px;padding-top:20px;border-top:1px solid var(--line);margin-top:auto;}

/* Share */
.pj-share-btn{display:flex;align-items:center;gap:7px;font-family:var(--m);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.5);background:transparent;border:1px solid var(--line2);padding:9px 16px;cursor:pointer;transition:color .2s,border-color .2s;position:relative;}
.pj-share-btn:hover{color:#fff;border-color:rgba(255,255,255,.3);}
.pj-share-btn svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.pj-share-drop{position:absolute;bottom:calc(100% + 6px);left:0;z-index:200;background:rgba(10,10,10,.97);backdrop-filter:blur(16px);border:1px solid var(--line2);padding:6px 0;min-width:160px;opacity:0;pointer-events:none;transform:translateY(4px);transition:opacity .15s,transform .15s;}
.pj-share-drop.open{opacity:1;pointer-events:auto;transform:translateY(0);}
.pj-share-opt{padding:9px 16px;font-family:var(--m);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.6);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s,color .15s;}
.pj-share-opt:hover{background:rgba(255,42,42,.1);color:#fff;}
.pj-share-opt svg{width:11px;height:11px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.pj-ext-btn{display:flex;align-items:center;gap:7px;font-family:var(--m);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.5);background:transparent;border:1px solid var(--line2);padding:9px 16px;cursor:pointer;text-decoration:none;transition:color .2s,border-color .2s;}
.pj-ext-btn:hover{color:#fff;border-color:rgba(255,255,255,.3);}
.pj-ext-btn svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── SPLIT LAYOUT — CSS Grid, sticky right panel ── */
.pj-split{
  padding-top:56px;display:grid;
  grid-template-columns:var(--left-w) var(--right-w);
  margin-top:var(--nav-h);
  align-items:start;
}

/* ── LEFT GALLERY — scrolls with page ── */
.pj-gallery-wrap{grid-column:1;}
.pj-gallery{display:flex;flex-direction:column;}
.pj-img-block{position:relative;overflow:hidden;background:var(--g2);}
/* ── VIDEO IN GALLERY ── */
.pj-vid-block{position:relative;overflow:hidden;background:#000;line-height:0;}
.pj-yt-block{position:relative;overflow:hidden;background:#000;padding-bottom:56.25%;height:0;}
.pj-yt-block iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}

.pj-vid-block video{width:100%;height:auto;display:block;}
.pj-vid-block video::-webkit-media-controls{opacity:.6;}
.pj-vid-block video:hover::-webkit-media-controls{opacity:1;}

.pj-img-block img.img-error{opacity:0;}
.pj-img-ph{
  display:none;position:absolute;inset:0;
  background:var(--g2);
  flex-direction:column;align-items:center;justify-content:center;
  gap:12px;min-height:200px;
}
.pj-img-block:has(img.img-error) .pj-img-ph{display:flex;}
.pj-img-ph svg{width:36px;height:36px;opacity:.12;fill:none;stroke:#fff;stroke-width:1.5;}
.pj-img-ph span{font-family:var(--m);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.18);text-align:center;line-height:1.6;}

.pj-img-block img{width:100%;height:auto;display:block;transform:scale(1.05);transition:transform 1.2s var(--ease);}
.pj-img-block.in-view img{transform:scale(1);}
.pj-img-pair{display:grid;grid-template-columns:1fr 1fr;}
.pj-img-pair .pj-img-block img{height:100%;object-fit:cover;}
.pj-gap-top{margin-top:3px;}

/* ── BOTTOM — full width, naturally outside the grid ── */
.pj-bottom-wrap{}

/* Prev/Next */
.pj-prevnext{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
.pj-prev,.pj-next{padding:40px;display:flex;flex-direction:column;gap:8px;text-decoration:none;transition:background .2s;}
.pj-prev{border-right:1px solid var(--line);}
.pj-prev:hover,.pj-next:hover{background:var(--g1);}
.pj-next{align-items:flex-end;}
.pj-nav-dir{font-family:var(--m);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.28);display:flex;align-items:center;gap:6px;}
.pj-nav-dir svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.pj-nav-title{font-size:15px;font-weight:600;color:#fff;line-height:1.3;}
.pj-nav-cat{font-family:var(--m);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);}

/* Related */
.pj-related{padding:72px 40px;}
.pj-section-label{font-family:var(--m);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:32px;display:flex;align-items:center;gap:14px;}
.pj-section-label::after{content:'';flex:1;height:1px;background:var(--line);}
.pj-related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.pj-rel-card{text-decoration:none;display:block;}
.pj-rel-img{aspect-ratio:808/632;overflow:hidden;background:var(--g2);margin-bottom:12px;}
.pj-rel-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease);}
.pj-rel-card:hover .pj-rel-img img{transform:scale(1.04);}
.pj-rel-cat{font-family:var(--m);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);margin-bottom:4px;}
.pj-rel-title{font-size:14px;font-weight:600;color:#fff;line-height:1.3;}
.pj-rel-yr{font-family:var(--m);font-size:10px;color:rgba(255,255,255,.3);margin-top:3px;}

/* CTA */
.pj-cta{background:var(--g1);border-top:1px solid var(--line);padding:80px 40px;text-align:center;}
.pj-cta-eyebrow{font-family:var(--m);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--red);margin-bottom:16px;}
.pj-cta-title{font-size:clamp(28px,4vw,42px);font-weight:800;letter-spacing:-.025em;margin-bottom:12px;}
.pj-cta-sub{font-size:15px;font-weight:300;color:rgba(255,255,255,.45);margin-bottom:32px;}
.pj-cta-btn{display:inline-flex;align-items:center;gap:10px;background:var(--red);color:#fff;font-family:var(--m);font-size:11px;letter-spacing:.2em;text-transform:uppercase;padding:14px 32px;text-decoration:none;transition:opacity .2s;}
.pj-cta-btn:hover{opacity:.85;}



/* 404 */
.pj-404{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:40px;}
.pj-404-n{font-size:80px;font-weight:900;color:rgba(255,255,255,.04);letter-spacing:-.06em;}
.pj-404-t{font-size:22px;font-weight:700;}
.pj-404-s{font-size:14px;color:rgba(255,255,255,.4);}
.pj-404 a{color:var(--red);text-decoration:none;}


/* ── FOOTER (same as index) ── */
footer{border-top:1px solid var(--line)}
.ft-main{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--line)}
.ft-col{padding:22px clamp(20px,4vw,52px);border-right:1px solid var(--line);display:flex;align-items:center}
.ft-col:last-child{border-right:none;justify-content:flex-end}
.ft-brand{display:flex;align-items:center;gap:10px}
.ft-logo{width:30px;height:30px;object-fit:contain;opacity:.85}
.ft-name{font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
.ft-copy{font-family:var(--m);font-size:12px;letter-spacing:.06em;color:rgba(255,255,255,.55)}
.ft-links{display:flex;gap:clamp(14px,2vw,24px);flex-wrap:wrap}
.ft-lnk{font-family:var(--m);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.55);transition:color .2s;position:relative;padding-bottom:2px}
.ft-lnk::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--red);transform:scaleX(0);transform-origin:left;transition:transform .3s var(--ease)}
.ft-lnk:hover{color:var(--white)}
.ft-lnk:hover::after{transform:scaleX(1)}
.ft-btm{padding:14px clamp(20px,4vw,52px);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;font-family:var(--m);font-size:11px;letter-spacing:.08em;color:rgba(255,255,255,.45)}
.ft-btm a{color:rgba(255,255,255,.3);transition:color .2s}
.ft-btm a:hover{color:var(--red)}
@media(max-width:768px){.ft-main{grid-template-columns:1fr}.ft-col{border-right:none;border-bottom:1px solid var(--line)}.ft-col:last-child{justify-content:flex-start}}

/* ── MOBILE ── */
@media(max-width:768px){
  
  .pj-split{display:flex;flex-direction:column;}
  .pj-gallery-wrap{order:2;}
  .pj-right{position:relative;top:auto;width:100%;height:auto;border-left:none;border-bottom:1px solid var(--line);padding:36px 24px;order:1;}
  .pj-gallery-wrap{width:100%;margin-top:0;}
  .pj-prevnext{grid-template-columns:1fr;}
  .pj-prev{border-right:none;border-bottom:1px solid var(--line);}
  .pj-next{align-items:flex-start;}
  .pj-related-grid{grid-template-columns:1fr 1fr;}
  .pj-related{padding:48px 20px;}
  .pj-cta{padding:60px 20px;}
  
}
@media(max-width:480px){
  .pj-related-grid{grid-template-columns:1fr;}
}
<style id="sh-styles">
:root{--black:#000;--white:#fff;--red:#ff2a2a;--g1:#0a0a0a;--g2:#111;--g3:#1a1a1a;--line:rgba(255,255,255,.07);--ease:cubic-bezier(.19,1,.22,1);--f:'Outfit',sans-serif;--m:'DM Mono',monospace;}

a{color:inherit;text-decoration:none;}
#sh-nav{position:fixed;top:0;left:0;right:0;z-index:900;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(20px,4vw,44px);background:rgba(0,0,0,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--line);}
.sh-logo{display:flex;align-items:center;gap:11px;}
.sh-logo img{width:28px;height:28px;object-fit:contain;}
.sh-logo span{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#fff;}
.sh-links{display:flex;gap:clamp(16px,2.5vw,36px);list-style:none;}
.sh-links a{font-size:12px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.55);transition:color .2s;}

.sh-cta{font-family:var(--m);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#fff;border:1px solid rgba(255,255,255,.2);padding:7px 16px;transition:border-color .2s,background .2s;}
.sh-cta:hover{border-color:var(--red);background:rgba(255,42,42,.08);}

.sh-ft-col{padding:20px clamp(20px,4vw,44px);border-right:1px solid var(--line);display:flex;align-items:center;}
.sh-ft-col:last-child{border-right:none;justify-content:flex-end;}
.sh-ft-brand{display:flex;align-items:center;gap:10px;}
.sh-ft-logo{width:28px;height:28px;object-fit:contain;opacity:.7;}
.sh-ft-name{font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.65);}
.sh-ft-copy{font-family:var(--m);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25);}
.sh-ft-links{display:flex;flex-wrap:wrap;gap:4px 14px;}
.sh-ft-link{font-family:var(--m);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);transition:color .2s;}
.sh-ft-link:hover{color:#fff;}
.sh-ft-btm{padding:14px clamp(20px,4vw,44px);display:flex;align-items:center;justify-content:space-between;font-family:var(--m);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.2);}
.sh-ft-btm a{color:rgba(255,255,255,.25);transition:color .2s;}
.sh-ft-btm a:hover{color:#fff;}
@media(max-width:768px){

  .sh-ft-main{grid-template-columns:1fr;}
  .sh-ft-col{border-right:none;border-top:1px solid var(--line);}
  .sh-ft-col:first-child{border-top:none;}
  .sh-ft-col:last-child{justify-content:flex-start;}
}

/* ── IMMERSIVE SCROLL REVEALS ────────────────────────── */
.pj-img-block,.pj-vid-block,.pj-yt-block,.pj-img-pair{
  opacity:0;transform:translateY(32px) scale(0.99);
  transition:opacity .8s cubic-bezier(.19,1,.22,1),transform .8s cubic-bezier(.19,1,.22,1);
}
.pj-img-block.vis,.pj-vid-block.vis,.pj-yt-block.vis,.pj-img-pair.vis{
  opacity:1;transform:none;
}
.pj-img-pair .pj-img-block{opacity:1;transform:none;}
.pj-cat,.pj-title,.pj-meta-row,.pj-desc-text,.pj-actions{
  opacity:0;transform:translateY(18px);
  transition:opacity .7s cubic-bezier(.19,1,.22,1),transform .7s cubic-bezier(.19,1,.22,1);
}

<script>
var PJKEY='cd_pj';
var CMAP={ux:'UX / UI Design',brand:'Brand Identity',deck:'Presentation Design',print:'Print & Marketing',web:'Interactive Web'};
function gPj(){try{return JSON.parse(localStorage.getItem(PJKEY))||[]}catch(e){return[]}}
function getPjId(){return new URLSearchParams(window.location.search).get('id')}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function setMeta(p,c){var el=document.querySelector('meta[property="'+p+'"]');if(!el){el=document.createElement('meta');el.setAttribute('property',p);document.head.appendChild(el);}el.setAttribute('content',c);}

function getYTId(url){
  if(!url)return null;
  var m=url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([\w-]{11})/);
  return m?m[1]:null;
}
function togglePjShare(btn){btn.querySelector('.pj-share-drop').classList.toggle('open');}
function copyPjLink(){
  navigator.clipboard.writeText(window.location.href).then(function(){
    var el=document.getElementById('pj-copy-opt');
    if(el){var t=el.textContent;el.textContent='\u2713 Copied!';setTimeout(function(){el.textContent=t;},2000);}
  });
  document.querySelectorAll('.pj-share-drop').forEach(function(d){d.classList.remove('open');});
}
function nativePjShare(title){
  if(navigator.share){navigator.share({title:title+' \u2014 Carving Dezine',url:window.location.href});}
  else{navigator.clipboard.writeText(window.location.href);}
  document.querySelectorAll('.pj-share-drop').forEach(function(d){d.classList.remove('open');});
}
document.addEventListener('click',function(e){if(!e.target.closest('.pj-share-btn'))document.querySelectorAll('.pj-share-drop').forEach(function(d){d.classList.remove('open');});});

function render(){
  var id=getPjId();
  var root=document.getElementById('pj-root');
  var projects=gPj();
  var pj=projects.find(function(p){return p.id===id});

  if(!pj){
    root.innerHTML='<div class="pj-404"><div class="pj-404-n">404</div><div class="pj-404-t">Project not found</div><div class="pj-404-s">This project may have been removed.</div><a href="index.html#work">\u2190 Back to all work</a></div>';
    return;
  }

  document.title=pj.title+' \u2014 Carving Dezine';
  var pjDesc=pj.body?pj.body.slice(0,160).replace(/\n/g,' '):(pj.desc||('A '+catLabel+' project by Carving Dezine.'));
  // Update canonical
  var canon=document.getElementById('pj-canonical');
  if(canon)canon.href=window.location.href;
  // OG
  setMeta('og:title',pj.title+' \u2014 Carving Dezine');
  setMeta('og:description',pjDesc);
  setMeta('og:url',window.location.href);
  if(pj.img){setMeta('og:image',pj.img);setMeta('twitter:image',pj.img);}
  // Twitter
  setMeta('twitter:title',pj.title+' \u2014 Carving Dezine');
  setMeta('twitter:description',pjDesc);
  // Page description
  var metaDesc=document.querySelector('meta[name="description"]');
  if(!metaDesc){metaDesc=document.createElement('meta');metaDesc.name='description';document.head.appendChild(metaDesc);}
  metaDesc.content=pjDesc;
  // Schema
  var schema={
    "@context":"https://schema.org",
    "@type":"CreativeWork",
    "name":pj.title,
    "creator":{"@type":"Person","name":"Tanvi Shah","url":"https://www.carvingdezine.com"},
    "url":window.location.href,
    "description":pjDesc,
    "genre":catLabel
  };
  if(pj.img)schema.image=pj.img;
  if(pj.year)schema.dateCreated=pj.year;
  var schemaEl=document.getElementById('pj-schema');
  if(!schemaEl){schemaEl=document.createElement('script');schemaEl.type='application/ld+json';schemaEl.id='pj-schema';document.head.appendChild(schemaEl);}
  schemaEl.textContent=JSON.stringify(schema);

  var catLabel=CMAP[pj.cat]||pj.cat||'Project';

  // ── GALLERY ──
  var imgs=pj.images&&pj.images.length?pj.images.slice():[];
  if(pj.img){
    var coverExists=imgs.some(function(im){return im.url===pj.img;});
    if(!coverExists)imgs.unshift({url:pj.img,layout:'full',gap:false});
  }
  var galleryH='<div class="pj-gallery">';
  var i=0;
  while(i<imgs.length){
    var img=imgs[i];
    var gapClass=img.gap?' pj-gap-top':'';
    if(img.layout==='side'&&i+1<imgs.length&&imgs[i+1].layout==='side'){
      galleryH+='<div class="pj-img-pair'+gapClass+'"><div class="pj-img-block"><img src="'+esc(img.url)+'" loading="'+(i<2?'eager':'lazy')+'" alt="" onerror="this.classList.add(\'img-error\')"/><div class="pj-img-ph"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Not uploaded</span></div></div><div class="pj-img-block"><img src="'+esc(imgs[i+1].url)+'" loading="lazy" alt="" onerror="this.classList.add(\'img-error\')"/><div class="pj-img-ph"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Not uploaded</span></div></div></div>';
      i+=2;
    }else{
      var isYT=img.type==='youtube'||img.url.indexOf('youtube.com')!==-1||img.url.indexOf('youtu.be')!==-1;
      var isVid=!isYT&&(img.type==='video'||/.(mp4|webm|mov)$/i.test(img.url||''));
    if(isYT){
      var ytId=getYTId(img.url);
      galleryH+='<div class="pj-yt-block'+gapClass+'">'
        +(ytId?'<iframe src="https://www.youtube.com/embed/'+ytId+'?rel=0&modestbranding=1" allowfullscreen allow="autoplay; encrypted-media"></iframe>'
          :'<div style="color:rgba(255,255,255,.3);padding:40px;text-align:center;font-family:var(--m);font-size:11px;letter-spacing:.14em;">Invalid YouTube URL</div>')
        +'</div>';
    } else if(isVid){
      galleryH+='<div class="pj-vid-block'+gapClass+'">'
        +'<video src="'+esc(img.url)+'" muted loop playsinline preload="auto" controls style="cursor:pointer"></video>'
        +'</div>';
    } else {
      galleryH+='<div class="pj-img-block'+gapClass+'"><img src="'+esc(img.url)+'" loading="'+(i===0?'eager':'lazy')+'" alt="" onerror="this.classList.add(\'img-error\')"/><div class="pj-img-ph"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Image not uploaded yet</span></div></div>';
    }
      i++;
    }
  }
  galleryH+='</div>';

  // ── META ──
  var metaH='';
  if(pj.year)metaH+='<div class="pj-meta-row"><span class="pj-meta-label">Year</span><span class="pj-meta-val">'+esc(pj.year)+'</span></div>';
  if(pj.client)metaH+='<div class="pj-meta-row"><span class="pj-meta-label">Client</span><span class="pj-meta-val">'+esc(pj.client)+'</span></div>';
  metaH+='<div class="pj-meta-row"><span class="pj-meta-label">Category</span><span class="pj-meta-val">'+catLabel+'</span></div>';

  var descH='';
  if(pj.desc)descH+='<div class="pj-desc-text pj-desc-short">'+esc(pj.desc)+'</div>';
  if(pj.body)descH+='<div class="pj-desc-text">'+esc(pj.body)+'</div>';

  var shareH='<button class="pj-share-btn" onclick="togglePjShare(this)">'
    +'<svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Share'
    +'<div class="pj-share-drop">'
    +'<div class="pj-share-opt" id="pj-copy-opt" onclick="copyPjLink()"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy link</div>'
    +'<div class="pj-share-opt" onclick="nativePjShare(\''+esc(pj.title)+'\')"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Share\u2026</div>'
    +'</div></button>';

  var extH=pj.link
    ?'<a class="pj-ext-btn" href="'+esc(pj.link)+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>'+(pj.src==='behance'?'Behance':pj.src==='dribbble'?'Dribbble':'View Project')+'</a>'
    :'';

  // ── PREV / NEXT ──
  var idx=projects.findIndex(function(p){return p.id===id});
  var prev=idx<projects.length-1?projects[idx+1]:null;
  var next=idx>0?projects[idx-1]:null;
  var prevH=prev
    ?'<a class="pj-prev" href="project.html?id='+prev.id+'"><span class="pj-nav-dir"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Previous</span><span class="pj-nav-cat">'+(CMAP[prev.cat]||'')+'</span><span class="pj-nav-title">'+esc(prev.title)+'</span></a>'
    :'<div></div>';
  var nextH=next
    ?'<a class="pj-next" href="project.html?id='+next.id+'"><span class="pj-nav-dir">Next<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></span><span class="pj-nav-cat">'+(CMAP[next.cat]||'')+'</span><span class="pj-nav-title">'+esc(next.title)+'</span></a>'
    :'<div></div>';

  // ── RELATED ──
  var related=projects.filter(function(p){return p.id!==id&&p.cat===pj.cat&&p.img}).slice(0,3);
  var relatedH=related.length
    ?'<div class="pj-related"><div class="pj-section-label">Related Projects</div><div class="pj-related-grid">'
      +related.map(function(r){
        return '<a class="pj-rel-card" href="project.html?id='+r.id+'">'
          +'<div class="pj-rel-img"><img src="'+esc(r.img)+'" alt="'+esc(r.title)+'" loading="lazy"/></div>'
          +'<div class="pj-rel-cat">'+(CMAP[r.cat]||r.cat)+'</div>'
          +'<div class="pj-rel-title">'+esc(r.title)+'</div>'
          +'<div class="pj-rel-yr">'+r.year+(r.client?' \u00b7 '+r.client:'')+'</div></a>';
      }).join('')
      +'</div></div>'
    :'';

  // ── ASSEMBLE ──
  // Right panel is fixed via CSS — inject it directly into body
  // Gallery wrap only takes left 60% — right panel floats over the right 40%
  // Bottom sections are full width and flow naturally after gallery
  root.innerHTML=
    // Fixed right panel
    '<div class="pj-split">'
    +'<div class="pj-gallery-wrap">'+galleryH+'</div>'
    +'<div class="pj-right">'
      +'<div class="pj-progress"><div class="pj-progress-bar" id="pj-prog"></div></div>'
      +'<div class="pj-cat">'+catLabel+'</div>'
      +'<div class="pj-title">'+esc(pj.title)+'</div>'
      +'<div class="pj-meta">'+metaH+'</div>'
      +descH
      +'<div class="pj-actions">'+shareH+extH+'</div>'
    +'</div>'
    +'</div>'
    +'<div class="pj-bottom-wrap">'
      +'<div class="pj-prevnext">'+prevH+nextH+'</div>'
      +relatedH
      +'<div class="pj-cta"><div class="pj-cta-eyebrow">Like what you see?</div><div class="pj-cta-title">Let\'s work together</div><div class="pj-cta-sub">Tell me about your project and let\'s create something remarkable.</div><a class="pj-cta-btn" href="index.html#contact">Get in touch</a></div>'
      +'<footer class="sh-footer"><div class="sh-ft-main"><div class="sh-ft-col"><div class="sh-ft-brand"><img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1NjYuOTMgNTY2LjkzIiBhcmlhLWxhYmVsPSJDYXJ2aW5nIERlemluZSI+PHBhdGggZmlsbD0icmdiYSgyNTUsMjU1LDI1NSwwLjA4KSIgZD0iTTI4My40Niw1NjYuOTNoMEMxMjYuOTEsNTY2LjkzLDAsNDQwLjAyLDAsMjgzLjQ3aDBDMCwxMjYuOTEsMTI2LjkxLDAsMjgzLjQ2LDBzMjgzLjQ2LDEyNi45MSwyODMuNDYsMjgzLjQ2aDBjMCwxNTYuNTUtMTI2LjkxLDI4My40Ni0yODMuNDYsMjgzLjQ2Ii8+PHBhdGggZmlsbD0iI2ZmZiIgZD0iTTIyNS40NywzMjFjMC0zMi41NSwyNS43OS01OS4yNiw1Ny40Mi01OS41NGg2NS45MnYtNjAuNTFjLTQxLjQyLDAtNjYuMjMsMC02Ni4yOCwwLTY0LjM3LjUyLTExNi43NCw1NC4zNy0xMTYuNzQsMTIwLjA0LDAsMzIuMjksMTIuNTgsNjEuNjEsMzIuOTgsODMuMjFsLTI0LjUxLDQ5LjM0LDY0LjY1LTIxLjQ2YzEzLjc1LDUuNzYsMjguOCw4Ljk2LDQ0LjU2LDguOTYsMTQuMzIsMCwyOC4wNC0yLjYzLDQwLjc1LTcuNDN2LTcwLjMxYy0xMC40OCwxMC42NC0yNC44OCwxNy4yMy00MC43NSwxNy4yMy0zMS45OCwwLTU4LTI2LjcxLTU4LTU5LjU0Ii8+PHJlY3QgZmlsbD0icmdiYSgyNTUsMjU1LDI1NSwwLjQpIiB4PSIzMjQuMjIiIHk9IjIwMC45NSIgd2lkdGg9IjE3LjI0IiBoZWlnaHQ9IjYwLjQ4Ii8+PHBhdGggZmlsbD0iI2ZmZiIgZD0iTTQwMC40NywxMTMuMzljLTMyLjU5LDAtNTkuMDEsMjYuNDItNTkuMDEsNTloMHYxNDguNjFjMCwxLjA5LS4xLDIuMTYtLjE2LDMuMjRoLjE2djEwMS4xNWMzNS42MS0yMC42Niw1OS42OS01OS43LDU5LjY5LTEwNC4zOVYxMTMuNDFjLS4yMywwLS40Ni0uMDItLjY4LS4wMiIvPjwvc3ZnPg==" class="sh-ft-logo" alt="Carving Dezine"/><span class="sh-ft-name">Carving Dezine</span></div></div><div class="sh-ft-col"><span class="sh-ft-copy">&copy; 2026 Carving Dezine &middot; Mumbai &amp; Surat, India</span></div><div class="sh-ft-col"><div class="sh-ft-links"><a href="https://behance.net/carvingdezine" target="_blank" rel="noopener" class="sh-ft-link">Behance</a><a href="https://dribbble.com/carvingdezine" target="_blank" rel="noopener" class="sh-ft-link">Dribbble</a><a href="https://instagram.com/carvingdezine" target="_blank" rel="noopener" class="sh-ft-link">Instagram</a><a href="https://linkedin.com/company/carvingdezine" target="_blank" rel="noopener" class="sh-ft-link">LinkedIn</a><a href="https://x.com/carvingdezine" target="_blank" rel="noopener" class="sh-ft-link">X</a><a href="mailto:carvingdezine@gmail.com" class="sh-ft-link">Email</a><a href="#" onclick="window.scrollTo({top:0,behavior:\'smooth\'});return false;" class="sh-ft-link">&#8593; Top</a></div></div></div><div class="sh-ft-btm"><span>Freelance UX/UI &amp; Brand Designer &nbsp;&middot;&nbsp; www.carvingdezine.com</span><a href="index.html#admin" target="_blank">Admin</a></div></footer>'
    +'</div>';

  // ── SCROLL PROGRESS ──
  var galleryWrap=document.querySelector('.pj-gallery-wrap');
  var progBar=document.getElementById('pj-prog');
  window.addEventListener('scroll',function(){
    if(!galleryWrap||!progBar)return;
    var rect=galleryWrap.getBoundingClientRect();
    var total=galleryWrap.offsetHeight-window.innerHeight;
    var scrolled=Math.max(0,-rect.top);
    progBar.style.width=total>0?Math.min(100,(scrolled/total)*100)+'%':'100%';
  },{passive:true});

  // ── VIDEO AUTOPLAY FIX ──
  // Browsers require muted as a DOM property (not just attribute) for autoplay
  requestAnimationFrame(function(){
    document.querySelectorAll('.pj-vid-block video').forEach(function(v){
      v.muted=true;
      v.play().catch(function(){
        // Autoplay blocked — video has controls so user can play manually
      });
    });
  });

  // ── IMAGE REVEAL ──
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('in-view');});
  },{threshold:0.05});
  document.querySelectorAll('.pj-img-block').forEach(function(el){obs.observe(el);});
}

render();

// ── IMMERSIVE SCROLL REVEALS ────────────────────────────
(function(){
  // Gallery images
  var imgObs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){e.target.classList.add('vis');imgObs.unobserve(e.target);}
    });
  },{threshold:0.06,rootMargin:'0px 0px -4% 0px'});
  document.querySelectorAll('.pj-img-block,.pj-vid-block,.pj-yt-block,.pj-img-pair').forEach(function(el){
    imgObs.observe(el);
  });

  // Right panel stagger
  var rp=document.querySelector('.pj-rp');
  if(rp){
    var rpObs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting){rp.classList.add('pj-rp-ready');rpObs.disconnect();}});
    },{threshold:0.1});
    rpObs.observe(rp);
  }

  // Bottom sections
  var btmObs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('vis');btmObs.unobserve(e.target);}});
  },{threshold:0.1});
  document.querySelectorAll('.pj-nav-row,.pj-rel-card,.pj-cta-inner').forEach(function(el){btmObs.observe(el);});
})();

</script>
